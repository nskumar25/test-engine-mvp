services:
  - type: web
    name: assessment-test-engine-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/AstuteAssessment.Api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: STUDENT_VIEW
        value: test_engine_registered_students
      - key: DATABASE_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: https://nskumar25.github.io
      - key: DATABASE_URL
        sync: false
